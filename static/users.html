<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户管理</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="user-admin-page paper-template-page">
    <div class="shell">
      <aside class="controls compact-controls">
        <div class="brand-block">
          <div>
            <p class="eyebrow">系统权限</p>
            <h1>用户管理</h1>
          </div>
          <div class="brand-actions">
            <div class="user-badge">
              <span>当前用户</span>
              <strong data-current-user>未登录</strong>
            </div>
            <p class="subtle">管理普通用户状态和密码重置。</p>
            <p class="subtle"><a href="/">组合回测</a> · <a href="/admin" data-admin-only>系统管理员</a> · <a href="#" data-logout>退出</a></p>
          </div>
        </div>
        <div class="actions template-page-actions">
          <button id="reloadUsersBtn" type="button" class="secondary">刷新用户</button>
        </div>
        <p id="usersStatus" class="status">正在读取用户列表。</p>
      </aside>
      <main class="workspace">
        <section class="panel compact-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">用户列表</p>
              <h3>注册用户与状态</h3>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>用户名</th>
                  <th>显示名称</th>
                  <th>角色</th>
                  <th>状态</th>
                  <th>创建时间</th>
                  <th>最近登录</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="usersTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="/static/auth.js"></script>
    <script src="/static/users.js"></script>
  </body>
</html>
