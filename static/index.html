<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T 日信号摆动组合回测</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="controls">
        <div class="brand-block">
          <p class="eyebrow">Signal Swing Portfolio Lab</p>
          <h1>T 日信号摆动组合回测</h1>
          <p class="subtle">
            用 `T` 日和历史数据生成信号，在 `T+1` 日开盘买入、`T+N` 日开盘卖出，运行 TopN 组合回测。
          </p>
        </div>

        <form id="btForm" class="form-grid">
          <label>
            <span>处理后数据目录</span>
            <input id="processedDir" type="text" value="D:/量化/Momentum/T_0_system/data_bundle/processed_qfq" />
          </label>

          <div class="two-col">
            <label>
              <span>开始日期</span>
              <input id="startDate" type="text" placeholder="20160101" />
            </label>
            <label>
              <span>结束日期</span>
              <input id="endDate" type="text" placeholder="20260417" />
            </label>
          </div>

          <label>
            <span>买入条件</span>
            <textarea id="buyCondition" rows="4">m20&gt;0,m5&gt;m5[1],vr&lt;1.5,hs300_pct_chg&gt;-1.0</textarea>
          </label>

          <label>
            <span>评分表达式</span>
            <textarea id="scoreExpression" rows="3">m20 + m5 - abs(pct_chg) * 0.1</textarea>
          </label>

          <div class="three-col">
            <label>
              <span>TopN</span>
              <input id="topN" type="number" value="5" min="1" max="500" />
            </label>
            <label>
              <span>初始资金</span>
              <input id="initialCash" type="number" value="100000" min="1" step="0.01" />
            </label>
            <label>
              <span>每笔目标资金</span>
              <input id="perTradeBudget" type="number" value="10000" min="1" step="0.01" />
            </label>
          </div>

          <div class="three-col">
            <label>
              <span>买入偏移</span>
              <input id="entryOffset" type="number" value="1" min="1" max="5" />
            </label>
            <label>
              <span>卖出偏移N</span>
              <input id="exitOffset" type="number" value="2" min="2" max="5" />
            </label>
            <label>
              <span>每手股数</span>
              <input id="lotSize" type="number" value="100" min="1" />
            </label>
          </div>

          <div class="three-col">
            <label>
              <span>买入费率</span>
              <input id="buyFeeRate" type="number" value="0.00003" step="0.00001" min="0" />
            </label>
            <label>
              <span>卖出费率</span>
              <input id="sellFeeRate" type="number" value="0.00003" step="0.00001" min="0" />
            </label>
            <label>
              <span>印花税</span>
              <input id="stampTaxSell" type="number" value="0" step="0.0001" min="0" />
            </label>
          </div>

          <div class="three-col">
            <label>
              <span>滑点(bps)</span>
              <input id="slippageBps" type="number" value="5" step="0.1" min="0" />
            </label>
            <label>
              <span>最低佣金</span>
              <input id="minCommission" type="number" value="0" step="0.01" min="0" />
            </label>
            <label>
              <span>严格成交</span>
              <select id="realisticExecution">
                <option value="true" selected>是</option>
                <option value="false">否</option>
              </select>
            </label>
          </div>

          <div class="actions">
            <button id="runBtn" type="submit">运行回测</button>
            <button id="exportBtn" type="button" class="secondary">下载 CSV ZIP</button>
          </div>
        </form>

        <p id="status" class="status">等待输入。</p>
      </aside>

      <main class="workspace">
        <section class="summary-strip">
          <div class="summary-intro">
            <p class="eyebrow">Summary</p>
            <h2>组合结果</h2>
          </div>
          <div id="summaryGrid" class="summary-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Equity</p>
              <h3>资金曲线</h3>
            </div>
            <p id="diagText" class="panel-note"></p>
          </div>
          <div id="equityChart" class="chart-box"></div>
        </section>

        <section class="split">
          <section class="panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Picks</p>
                <h3>每日选股明细</h3>
              </div>
            </div>
            <div class="table-wrap">
              <table id="pickTable"></table>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Trades</p>
                <h3>交易流水</h3>
              </div>
            </div>
            <div class="table-wrap">
              <table id="tradeTable"></table>
            </div>
          </section>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Contribution</p>
              <h3>个股贡献汇总</h3>
            </div>
          </div>
          <div class="table-wrap">
            <table id="contributionTable"></table>
          </div>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
