<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>股票池模板管理</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="stock-pool-page paper-template-page">
    <div class="shell">
      <aside class="controls compact-controls">
        <div class="brand-block">
          <div>
            <p class="eyebrow">股票池工作台</p>
            <h1>股票池模板管理</h1>
          </div>
          <div class="brand-actions">
            <p class="subtle">只维护用户手工股票列表；第一阶段不会抓取行情，也不会改动现有回测和模拟交易入口。</p>
            <p class="subtle">
              <a href="/">组合回测</a>
              · <a href="/daily">每日收盘选股</a>
              · <a href="/paper">多账户模拟</a>
              · <a href="/sector">板块研究</a>
            </p>
          </div>
        </div>

        <form id="stockPoolPickerForm" class="form-grid compact-form">
          <label>
            <span>用户</span>
            <input id="poolUsername" type="text" value="505888" />
          </label>

          <label class="field-wide">
            <span>选择模板</span>
            <select id="poolTemplateSelect"></select>
          </label>

          <div class="actions template-page-actions">
            <button id="reloadPoolsBtn" type="button" class="secondary">刷新模板</button>
            <button id="loadPoolBtn" type="button" class="secondary">载入模板</button>
            <button id="newPoolBtn" type="button" class="secondary">新建模板</button>
            <button id="copyPoolBtn" type="button" class="secondary">复制模板</button>
            <button id="savePoolBtn" type="button">保存模板</button>
            <button id="deletePoolBtn" type="button" class="danger">删除模板</button>
          </div>

          <p id="poolStatus" class="status">正在读取股票池模板。</p>
        </form>
      </aside>

      <main class="workspace">
        <section class="summary-strip">
          <div class="summary-intro">
            <p class="eyebrow">模板摘要</p>
            <h2>当前股票池信息</h2>
            <p class="panel-note">模板名称与用户名唯一；删除模板只删除模板关系，不删除后续 SQLite 日线数据。</p>
          </div>
          <div id="poolSummaryGrid" class="summary-grid"></div>
        </section>

        <section class="panel compact-panel template-editor-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">模板字段</p>
              <h3>编辑股票池模板</h3>
            </div>
            <p class="panel-note">股票列表支持一行一个、空格、逗号或分号分隔；自动去重并保留首次出现顺序。</p>
          </div>

          <div class="stock-pool-editor-grid">
            <label>
              <span>模板名称</span>
              <input id="poolTemplateName" type="text" placeholder="例如 L2_中等市值主题股层" />
            </label>
            <label>
              <span>原模板名称</span>
              <input id="poolOriginalTemplateName" type="text" readonly />
            </label>
            <label class="check-field">
              <input id="poolIsActive" type="checkbox" />
              <span>参与后续每日更新</span>
            </label>
            <label class="field-wide">
              <span>模板说明</span>
              <input id="poolDescription" type="text" />
            </label>
            <label class="field-expression">
              <span>手工股票列表</span>
              <textarea id="poolStockText" placeholder="300750&#10;600941&#10;688981"></textarea>
            </label>
          </div>

          <div class="actions stock-pool-inline-actions">
            <button id="validatePoolBtn" type="button" class="secondary">校验股票列表</button>
            <button id="seedPoolsBtn" type="button" class="secondary">初始化基础模板</button>
          </div>
        </section>

        <section class="panel compact-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">校验结果</p>
              <h3>股票列表预览</h3>
            </div>
            <p id="poolValidationNote" class="panel-note">保存前建议先校验，确认有效股票、重复股票和格式错误项。</p>
          </div>
          <div class="table-wrap stock-pool-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>序号</th>
                  <th>股票代码</th>
                  <th>Tushare代码</th>
                  <th>股票名称</th>
                  <th>最新数据日期</th>
                </tr>
              </thead>
              <tbody id="poolStockRows"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="/static/stock_pools.js"></script>
  </body>
</html>
